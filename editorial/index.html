<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#c9150c">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <meta name="referrer" content="no-referrer">
  <title>Editorial</title>
  <link rel="stylesheet" href="styles.css?v=1">
</head>
<body>
  <div class="editorial-shell" aria-label="Estrutura editorial vazia">
    <div class="network-bar" aria-hidden="true">
      <div class="network-bar__inner">
        <span class="network-mark network-mark--wide"></span>
        <span class="network-mark"></span>
        <span class="network-mark"></span>
        <span class="network-mark network-mark--short"></span>
        <span class="network-mark"></span>
        <span class="network-mark network-mark--wide"></span>
        <span class="network-mark"></span>
      </div>
    </div>

    <header class="news-header" aria-hidden="true">
      <div class="news-header__inner">
        <div class="menu-shape"><i></i><i></i><i></i></div>
        <div class="brand-shape"><span></span><b></b></div>
        <div class="header-actions">
          <div class="search-shape"><i></i><span></span></div>
          <div class="account-shape"><i></i><span></span></div>
        </div>
      </div>
    </header>

    <main class="page-frame">
      <article class="article-column" aria-hidden="true">
        <div class="headline-skeleton">
          <span></span>
          <span></span>
          <span class="headline-skeleton__short"></span>
        </div>

        <div class="hero-placeholder">
          <div class="hero-placeholder__wash"></div>
          <div class="hero-placeholder__subject"></div>
          <div class="hero-placeholder__badge"></div>
        </div>

        <div class="caption-skeleton"></div>

        <div class="meta-skeleton">
          <span></span>
          <span></span>
          <span class="meta-skeleton__short"></span>
        </div>

        <div class="article-copy-skeleton">
          <p><span></span><span></span><span class="line-short"></span></p>
          <p><span></span><span></span><span></span><span class="line-medium"></span></p>
          <p><span></span><span></span><span class="line-short"></span></p>
          <div class="inline-media-placeholder"></div>
          <p><span></span><span></span><span></span><span class="line-medium"></span></p>
        </div>
      </article>

      <aside class="sidebar" aria-hidden="true">
        <div class="sidebar-title-skeleton"></div>

        <div class="side-card side-card--active">
          <span></span><span></span><span class="side-card__short"></span>
          <i></i>
        </div>
        <div class="side-card">
          <span></span><span class="side-card__medium"></span><span class="side-card__short"></span>
          <i></i>
        </div>
        <div class="side-card">
          <span></span><span></span><span class="side-card__short"></span>
          <i></i>
        </div>

        <div class="sidebar-section-title"></div>
        <div class="related-card">
          <div class="related-card__image"></div>
          <div class="related-card__body">
            <span></span><span></span><span class="related-card__short"></span>
            <i></i>
          </div>
        </div>
      </aside>
    </main>
  </div>
</body>
</html>
