name: Sync Meta Pixel ID

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/sync-meta-pixel.yml"

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace old Meta Pixel ID
        shell: bash
        run: |
          # Keep browser Pixel and server-side CAPI on the same dataset.
          OLD_ID="1002939839166097"
          NEW_ID="1725992278652713"
          grep -rl --exclude-dir=.git "$OLD_ID" . | xargs -r sed -i "s/$OLD_ID/$NEW_ID/g"

      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align Meta Pixel ID across site"
          git push
