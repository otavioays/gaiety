name: Validate tracking

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check storefront JavaScript
        run: node --check script.js
      - name: Check checkout tracking bridge
        run: node --check ds-completion.js
      - name: Check active Shopify custom pixel
        run: node --check shopify-custom-pixel-v2.js
