name: Validate tracking

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check storefront JavaScript
        run: node --check script.js
      - name: Check waitlist tracking bridge
        run: node --check tracking-bridge.js
