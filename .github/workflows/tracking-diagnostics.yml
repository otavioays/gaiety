name: Tracking diagnostics

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate scripts
        id: validate
        shell: bash
        run: |
          set +e
          node --check script.js > storefront.log 2>&1
          storefront_status=$?
          node --check shopify-custom-pixel.js > pixel.log 2>&1
          pixel_status=$?
          {
            echo "## Tracking syntax for $GITHUB_SHA"
            echo
            echo "- storefront: $storefront_status"
            echo "- custom pixel: $pixel_status"
            echo
            echo '```text'
            cat storefront.log
            cat pixel.log
            echo '```'
          } > diagnostics.md
          if [ "$storefront_status" -ne 0 ] || [ "$pixel_status" -ne 0 ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish diagnostics
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment 1 --body-file diagnostics.md
      - name: Mark failure
        if: steps.validate.outputs.failed == 'true'
        run: exit 1
