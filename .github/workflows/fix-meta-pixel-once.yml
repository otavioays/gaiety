name: Fix canonical Meta Pixel ID

on:
  push:
    paths:
      - ".github/workflows/fix-meta-pixel-once.yml"

permissions:
  contents: write

jobs:
  fix-meta-pixel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace legacy Pixel ID and remove this workflow
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/1002939839166097/1725992278652713/g' index.html
          rm -f .github/workflows/fix-meta-pixel-once.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes required"
            exit 0
          fi

          git commit -m "fix: use canonical Meta Pixel ID"
          git push
