name: Fix duplicate Meta browser and legacy server events

on:
  push:
    paths:
      - ".github/workflows/fix-meta-duplication-once.yml"

permissions:
  contents: write

jobs:
  fix-meta-duplication:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove duplicate Pixel initialization and legacy CAPI calls
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("final-offer.js")
          text = path.read_text(encoding="utf-8")

          def sub_once(pattern, replacement, source, label):
              updated, count = re.subn(pattern, replacement, source, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f"Expected exactly one match for {label}, found {count}")
              return updated

          text = sub_once(
              r'^\s*const PAGE_VIEW_KEY = "gaiety_meta_page_view_v3";\n',
              '',
              text,
              'PAGE_VIEW_KEY',
          )

          text = sub_once(
              r'\n\s*function readCookie\(name\)\{.*?\n\s*function trackerEvent',
              '\n\n  function trackerEvent',
              text,
              'readCookie block',
          )

          text = sub_once(
              r'\n\s*function ensureCorrectMetaPixel\(\)\{.*?\n\s*function createEventId',
              '\n\n  function metaPixelReady(){\n    return typeof window.fbq==="function";\n  }\n\n  function createEventId',
              text,
              'duplicate Pixel initializer',
          )

          text = sub_once(
              r'\n\s*function sendServerEvent\(.*?\n\s*function trackMetaEvent',
              '\n\n  function trackMetaEvent',
              text,
              'legacy CAPI sender',
          )

          required_replacements = {
              'if(ensureCorrectMetaPixel())': 'if(metaPixelReady())',
              'server_event_requested:true': 'server_event_requested:false',
              '\n    void sendServerEvent(eventName,eventId,customData,options);': '',
              '\n    ensureCorrectMetaPixel();': '',
              'https://gaiety-6507.myshopify.com/cart/': 'https://tedyzw-27.myshopify.com/cart/',
              'destination_host:"gaiety-6507.myshopify.com"': 'destination_host:"tedyzw-27.myshopify.com"',
          }

          for old, new in required_replacements.items():
              if old not in text:
                  raise SystemExit(f"Expected fragment not found: {old}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")
          PY

          rm -f .github/workflows/fix-meta-duplication-once.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes required"
            exit 0
          fi

          git commit -m "fix: remove duplicate Meta Pixel and legacy CAPI calls"
          git push
